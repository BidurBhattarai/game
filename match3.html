<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1a0d2e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>Match-3 Puzzle — GameHub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg0:#060912;--bg2:#141828;--bg3:#1e2438;--gold:#f0b429;--gold2:#ffd166;--purple:#8b5cf6;--pink:#e91e8c;--orange:#f97316;--text:#e8eaf0;--text2:#8892a4;--ff-display:'Orbitron',monospace;--ff-body:'Nunito',system-ui,sans-serif;--radius-sm:10px;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--ff-body);user-select:none;-webkit-user-select:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:radial-gradient(ellipse at 50% 0%,#1a0d2e,var(--bg0) 70%);overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none}
.g-topbar{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(6,9,18,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:50;position:sticky;top:0;}
.g-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--text);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.g-back:active{background:rgba(255,255,255,0.2)}
.g-title{font-family:var(--ff-display);font-size:0.85rem;font-weight:900;flex:1;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.g-score-badge{padding:5px 12px;border-radius:99px;border:1px solid rgba(240,180,41,0.3);font-size:0.75rem;font-weight:800;color:var(--gold);background:rgba(240,180,41,0.08);white-space:nowrap;}
.m3-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 16px 20px;gap:10px;max-width:480px;margin:0 auto;width:100%;}
.m3-hud{display:flex;gap:16px;align-items:center;background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:10px 16px;width:100%;}
.m3-hud-item{display:flex;flex-direction:column;align-items:center;flex:1}
.m3-hud-val{font-family:var(--ff-display);font-size:1.2rem;color:var(--gold);font-weight:900}
.m3-hud-lbl{font-size:0.62rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.m3-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;width:min(380px,96vw);}
.gem{aspect-ratio:1;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,4vw,1.4rem);transition:transform 0.12s,box-shadow 0.12s;border:2px solid transparent;position:relative;touch-action:manipulation;}
.gem.sel{border-color:var(--gold2);transform:scale(1.18);box-shadow:0 0 14px rgba(255,209,102,0.6);z-index:2;}
.gem.match-anim{animation:gemPop 0.3s ease forwards}
@keyframes gemPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(0);opacity:0}}
.m3-msg{font-size:0.88rem;color:var(--gold2);text-align:center;min-height:1.3rem;font-weight:700}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(14,18,32,0.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:10px 22px;font-size:0.85rem;font-weight:700;color:var(--text);z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="screen">
  <div class="g-topbar">
    <button class="g-back" onclick="goHome()">←</button>
    <div class="g-title">💎 Match-3 Puzzle</div>
    <div class="g-score-badge" id="m3-score-badge">0 pts</div>
  </div>
  <div class="m3-body">
    <div class="m3-hud">
      <div class="m3-hud-item"><div class="m3-hud-val" id="m3-score">0</div><div class="m3-hud-lbl">Score</div></div>
      <div class="m3-hud-item"><div class="m3-hud-val" id="m3-level">1</div><div class="m3-hud-lbl">Level</div></div>
      <div class="m3-hud-item"><div class="m3-hud-val" id="m3-moves">20</div><div class="m3-hud-lbl">Moves</div></div>
      <div class="m3-hud-item"><div class="m3-hud-val" id="m3-target">300</div><div class="m3-hud-lbl">Target</div></div>
    </div>
    <div class="m3-grid" id="m3-grid"></div>
    <div class="m3-msg" id="m3-msg"></div>
  </div>
</div>
<script>
const LS={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
let STATE=LS.get('gh_state',{pts:0,played:0,wins:0,best:{}});
function saveState(){LS.set('gh_state',STATE)}
function addScore(id,s){STATE.pts+=s;if(!STATE.best[id]||s>STATE.best[id])STATE.best[id]=s;saveState();}
function addWin(){STATE.wins=(STATE.wins||0)+1;saveState();}
function goHome(){window.location.href='../index.html';}
let _toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const GEMS_LIST=['🔴','🟠','🟡','🟢','🔵','🟣'];
const GEM_BG=['#ff444433','#ff941433','#ffd70033','#22c55e33','#3b82f633','#8b5cf633'];
const GEM_BD=['#ff4444','#ff9414','#ffd700','#22c55e','#3b82f6','#8b5cf6'];
let M3={};
function m3Init(){M3={grid:[],cols:8,rows:8,sel:null,busy:false,score:0,moves:20,level:1,target:300};m3Generate();m3Render();document.getElementById('m3-target').textContent=M3.target;}
function m3Generate(){M3.grid=[];for(let r=0;r<M3.rows;r++){M3.grid[r]=[];for(let c=0;c<M3.cols;c++){let g;do{g=Math.floor(Math.random()*5);}while((c>=2&&M3.grid[r][c-1]===g&&M3.grid[r][c-2]===g)||(r>=2&&M3.grid[r-1][c]===g&&M3.grid[r-2][c]===g));M3.grid[r][c]=g;}}}
function m3Render(){
  const el=document.getElementById('m3-grid');el.innerHTML='';
  for(let r=0;r<M3.rows;r++){for(let c=0;c<M3.cols;c++){const g=M3.grid[r][c];if(g===-1){const d=document.createElement('div');d.className='gem';el.appendChild(d);continue;}const d=document.createElement('div');d.className='gem';d.style.background=GEM_BG[g];d.style.borderColor=GEM_BD[g]+'66';d.textContent=GEMS_LIST[g];if(M3.sel&&M3.sel.r===r&&M3.sel.c===c)d.classList.add('sel');d.addEventListener('click',()=>m3Click(r,c));el.appendChild(d);}}
  document.getElementById('m3-score').textContent=M3.score;document.getElementById('m3-moves').textContent=M3.moves;document.getElementById('m3-level').textContent=M3.level;document.getElementById('m3-score-badge').textContent=M3.score+' pts';
}
function m3Click(r,c){
  if(M3.busy||M3.moves<=0)return;if(!M3.sel){M3.sel={r,c};m3Render();return;}
  const dr=Math.abs(r-M3.sel.r),dc=Math.abs(c-M3.sel.c),pr=M3.sel.r,pc=M3.sel.c;M3.sel=null;
  if(dr+dc!==1){m3Render();return;}
  [M3.grid[r][c],M3.grid[pr][pc]]=[M3.grid[pr][pc],M3.grid[r][c]];
  const matches=m3FindMatches();
  if(matches.length===0){[M3.grid[r][c],M3.grid[pr][pc]]=[M3.grid[pr][pc],M3.grid[r][c]];document.getElementById('m3-msg').textContent='No match! Try again.';setTimeout(()=>document.getElementById('m3-msg').textContent='',1400);m3Render();return;}
  M3.moves--;M3.busy=true;m3ProcessMatches(matches);
}
function m3FindMatches(){const found=new Set();for(let r=0;r<M3.rows;r++){let run=1;for(let c=1;c<=M3.cols;c++){if(c<M3.cols&&M3.grid[r][c]===M3.grid[r][c-1]&&M3.grid[r][c]>=0)run++;else{if(run>=3)for(let k=c-run;k<c;k++)found.add(r*M3.cols+k);run=1;}}}for(let c=0;c<M3.cols;c++){let run=1;for(let r=1;r<=M3.rows;r++){if(r<M3.rows&&M3.grid[r][c]===M3.grid[r-1][c]&&M3.grid[r][c]>=0)run++;else{if(run>=3)for(let k=r-run;k<r;k++)found.add(k*M3.cols+c);run=1;}}}return[...found];}
function m3ProcessMatches(matches){
  M3.score+=matches.length*10*M3.level;matches.forEach(i=>{M3.grid[Math.floor(i/M3.cols)][i%M3.cols]=-1;});m3Render();
  setTimeout(()=>{m3Drop();const nm=m3FindMatches();if(nm.length>0){M3.score+=nm.length*15*M3.level;m3ProcessMatches(nm);}
  else{M3.busy=false;document.getElementById('m3-score').textContent=M3.score;document.getElementById('m3-score-badge').textContent=M3.score+' pts';addScore('match3',M3.score);
    if(M3.moves<=0){if(M3.score>=M3.target){M3.level++;M3.moves=22+M3.level*2;M3.target=M3.level*350;document.getElementById('m3-msg').textContent='🎉 Level '+M3.level+'! Keep going!';if(M3.level>10){addWin();toast('Match-3 Champion! 💎');}}else{document.getElementById('m3-msg').textContent='Out of moves! Score: '+M3.score;setTimeout(()=>{m3Generate();M3.score=0;M3.moves=20;M3.level=1;M3.target=300;m3Render();},2200);}}m3Render();}},280);
}
function m3Drop(){for(let c=0;c<M3.cols;c++){let emp=0;for(let r=M3.rows-1;r>=0;r--){if(M3.grid[r][c]===-1)emp++;else if(emp>0){M3.grid[r+emp][c]=M3.grid[r][c];M3.grid[r][c]=-1;}}for(let r=0;r<emp;r++)M3.grid[r][c]=Math.floor(Math.random()*5);}}
m3Init();
history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>{history.pushState(null,'',location.href);goHome();});
</script>
</body>
</html>
