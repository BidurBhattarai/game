<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>Space Shooter — GameHub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg0:#060912;--gold:#f0b429;--purple:#8b5cf6;--pink:#e91e8c;--orange:#f97316;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--text2:#8892a4;--ff-display:'Orbitron',monospace;--ff-body:'Nunito',system-ui,sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:var(--ff-body);user-select:none;-webkit-user-select:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.g-topbar{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(6,9,18,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:50;}
.g-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--text);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.g-back:active{background:rgba(255,255,255,0.2)}
.g-title{font-family:var(--ff-display);font-size:0.85rem;font-weight:900;flex:1;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.g-score-badge{padding:5px 12px;border-radius:99px;border:1px solid rgba(240,180,41,0.3);font-size:0.75rem;font-weight:800;color:var(--gold);background:rgba(240,180,41,0.08);white-space:nowrap;}
.canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
canvas{display:block;max-width:100%;max-height:100%}
.canvas-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,9,18,0.88);backdrop-filter:blur(6px);gap:14px;padding:28px;pointer-events:all;}
.canvas-overlay.hidden{display:none;pointer-events:none}
.co-icon{font-size:4rem}.co-title{font-family:var(--ff-display);font-size:clamp(1.4rem,5vw,2rem);font-weight:900;text-align:center;}
.co-desc{font-size:0.88rem;color:var(--text2);text-align:center;max-width:280px}
.co-score{font-family:var(--ff-display);font-size:2.8rem;font-weight:900;color:var(--gold);}
.co-best{font-size:0.85rem;color:var(--text2)}
.co-btn{padding:14px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:var(--ff-display);touch-action:manipulation;}
.co-btn2{padding:10px 24px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text2);font-size:0.85rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.dpad{position:absolute;bottom:14px;left:14px;display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:3px;z-index:10;}
.dpbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;}
.dpbtn:active,.dpbtn.pressed{background:rgba(139,92,246,0.4)}
.dpbtn.empty{visibility:hidden;pointer-events:none}
.fire-btn{position:absolute;bottom:24px;right:20px;width:60px;height:60px;border-radius:50%;background:rgba(239,68,68,0.3);border:2px solid rgba(239,68,68,0.5);color:#fff;font-size:1.4rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;touch-action:none;}
.fire-btn:active{background:rgba(239,68,68,0.7)}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(14,18,32,0.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:10px 22px;font-size:0.85rem;font-weight:700;color:var(--text);z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="screen">
  <div class="g-topbar">
    <button class="g-back" onclick="goHome()">←</button>
    <div class="g-title">🚀 Space Shooter</div>
    <div class="g-score-badge" id="shooter-score-badge">0 pts</div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gc2"></canvas>
    <div class="canvas-overlay" id="shooter-start">
      <div class="co-icon">🚀</div>
      <div class="co-title">Space Shooter</div>
      <div class="co-desc">Destroy alien waves! Move with d-pad, tap 💥 to shoot.</div>
      <button class="co-btn" onclick="shooterStart()">▶ START</button>
    </div>
    <div class="canvas-overlay hidden" id="shooter-over">
      <div class="co-icon">🚀</div>
      <div class="co-title" id="shooter-over-title">Game Over!</div>
      <div class="co-score" id="shooter-final-score">0</div>
      <div class="co-best" id="shooter-best-label">Best: 0</div>
      <button class="co-btn" onclick="shooterStart()">🔄 Play Again</button>
      <button class="co-btn2" onclick="goHome()">← Hub</button>
    </div>
    <div class="dpad" id="shooter-dpad">
      <div class="dpbtn empty"></div>
      <button class="dpbtn" ontouchstart="dp('up',true)" ontouchend="dp('up',false)">▲</button>
      <div class="dpbtn empty"></div>
      <button class="dpbtn" ontouchstart="dp('left',true)" ontouchend="dp('left',false)">◀</button>
      <div class="dpbtn empty"></div>
      <button class="dpbtn" ontouchstart="dp('right',true)" ontouchend="dp('right',false)">▶</button>
      <div class="dpbtn empty"></div>
      <button class="dpbtn" ontouchstart="dp('down',true)" ontouchend="dp('down',false)">▼</button>
      <div class="dpbtn empty"></div>
    </div>
    <button class="fire-btn" id="fire-btn" ontouchstart="dp('fire',true)" ontouchend="dp('fire',false)">💥</button>
  </div>
</div>
<script>
const LS={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
let STATE=LS.get('gh_state',{pts:0,played:0,wins:0,best:{}});
function saveState(){LS.set('gh_state',STATE)}
function addScore(id,s){STATE.pts+=s;if(!STATE.best[id]||s>STATE.best[id])STATE.best[id]=s;saveState();}
function addWin(){STATE.wins=(STATE.wins||0)+1;saveState();}
function goHome(){if(_gl)cancelAnimationFrame(_gl);window.location.href='../index.html';}
let _toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const K={up:false,down:false,left:false,right:false,fire:false};
function dp(k,v){K[k]=v;}
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp')K.up=true;if(e.key==='ArrowDown')K.down=true;if(e.key==='ArrowLeft')K.left=true;if(e.key==='ArrowRight')K.right=true;if(e.key===' ')K.fire=true;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowUp')K.up=false;if(e.key==='ArrowDown')K.down=false;if(e.key==='ArrowLeft')K.left=false;if(e.key==='ArrowRight')K.right=false;if(e.key===' ')K.fire=false;});
const sc2=document.getElementById('gc2');
const s2ctx=sc2.getContext('2d');
let SH={};let _gl=null;
function shooterResize(){const wr=sc2.parentElement;sc2.width=wr.clientWidth;sc2.height=wr.clientHeight;}
window.addEventListener('resize',shooterResize);
function shooterStart(){
  document.getElementById('shooter-start').classList.add('hidden');
  document.getElementById('shooter-over').classList.add('hidden');
  shooterResize();const W=sc2.width,H=sc2.height;
  SH={px:W/2,py:H*0.82,spd:4,hp:3,inv:0,buls:[],enemies:[],parts:[],wave:1,score:0,frame:0,shootCD:0,prevFire:false,
    stars:Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*1.5+0.5})),W,H};
  spawnWave();if(_gl)cancelAnimationFrame(_gl);_gl=requestAnimationFrame(shooterLoop);
}
function spawnWave(){
  const n=8+(SH.wave-1)*2;
  for(let i=0;i<n;i++){const cols=Math.min(n,8),row=Math.floor(i/cols),col=i%cols;SH.enemies.push({x:SH.W/(cols+1)*(col+1),y:50+row*52,w:30,h:26,hp:1+(SH.wave>3?1:0),dx:(Math.random()>0.5?1:-1)*(0.7+SH.wave*0.12),ebs:[],fireT:60+Math.random()*80});}
}
function addPart(x,y,col){for(let i=0;i<7;i++)SH.parts.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:25,col});}
function shooterLoop(){
  const{W,H}=SH;SH.frame++;
  if(K.left&&SH.px>22)SH.px-=SH.spd;if(K.right&&SH.px<W-22)SH.px+=SH.spd;
  if(K.up&&SH.py>H*0.45)SH.py-=SH.spd;if(K.down&&SH.py<H-44)SH.py+=SH.spd;
  SH.shootCD--;
  if(K.fire&&SH.shootCD<=0){SH.buls.push({x:SH.px,y:SH.py,vy:-11});SH.shootCD=11;}
  if(SH.frame%20===0&&SH.enemies.length>0&&SH.shootCD<=0){SH.buls.push({x:SH.px,y:SH.py,vy:-9});SH.shootCD=11;}
  SH.buls.forEach(b=>b.y+=b.vy);SH.buls=SH.buls.filter(b=>b.y>-20);
  SH.enemies.forEach(e=>{
    if(e.hp<=0)return;e.x+=e.dx;if(e.x<e.w/2||e.x>W-e.w/2)e.dx*=-1;
    e.fireT--;if(e.fireT<=0){e.ebs.push({x:e.x,y:e.y+e.h,vy:2.8+SH.wave*0.25});e.fireT=70+Math.random()*60;}
    e.ebs.forEach(eb=>eb.y+=eb.vy);e.ebs=e.ebs.filter(eb=>eb.y<H+10);
    if(SH.inv<=0){for(const eb of e.ebs){if(Math.abs(eb.x-SH.px)<20&&Math.abs(eb.y-SH.py)<26){SH.hp--;SH.inv=90;e.ebs=e.ebs.filter(x=>x!==eb);if(SH.hp<=0){shooterOver();return;}}}}
  });
  if(SH.inv>0)SH.inv--;
  for(const b of SH.buls){for(const e of SH.enemies){if(e.hp>0&&b.y<e.y+e.h&&b.y>e.y-5&&Math.abs(b.x-e.x)<e.w/2+4){e.hp--;SH.buls=SH.buls.filter(x=>x!==b);addPart(e.x,e.y+e.h/2,e.hp<=0?'#ffd700':'#22c55e');if(e.hp<=0){SH.score+=10*SH.wave;}break;}}}
  SH.parts=SH.parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  if(SH.enemies.filter(e=>e.hp>0).length===0){if(SH.wave>=10){shooterOver(true);return;}SH.wave++;SH.hp=Math.min(SH.hp+1,3);SH.score+=100;SH.enemies=[];SH.buls=[];spawnWave();}
  s2ctx.fillStyle='#000';s2ctx.fillRect(0,0,W,H);
  SH.stars.forEach(s=>{s.y+=s.sp;if(s.y>H)s.y=0;s2ctx.fillStyle=`rgba(255,255,255,${0.2+s.s*0.15})`;s2ctx.beginPath();s2ctx.arc(s.x,s.y,s.s*0.6,0,Math.PI*2);s2ctx.fill();});
  SH.enemies.forEach(e=>{if(e.hp<=0)return;s2ctx.fillStyle=SH.wave>=4?'#e91e8c':'#22c55e';s2ctx.beginPath();s2ctx.moveTo(e.x,e.y+e.h);s2ctx.lineTo(e.x-e.w/2,e.y);s2ctx.lineTo(e.x+e.w/2,e.y);s2ctx.closePath();s2ctx.fill();s2ctx.fillStyle='#ef4444';s2ctx.beginPath();s2ctx.arc(e.x,e.y+e.h+4,4,0,Math.PI*2);s2ctx.fill();e.ebs.forEach(eb=>{s2ctx.fillStyle='#ff4444';s2ctx.fillRect(eb.x-3,eb.y,6,12);});});
  SH.buls.forEach(b=>{s2ctx.fillStyle='#ffd700';s2ctx.fillRect(b.x-2,b.y,4,14);});
  SH.parts.forEach(p=>{s2ctx.globalAlpha=p.life/25;s2ctx.fillStyle=p.col;s2ctx.beginPath();s2ctx.arc(p.x,p.y,3,0,Math.PI*2);s2ctx.fill();});s2ctx.globalAlpha=1;
  const px=SH.px,py=SH.py;
  if(!(SH.inv>0&&Math.floor(SH.frame/4)%2===0)){
    const tg=s2ctx.createRadialGradient(px,py+46,0,px,py+46,14);tg.addColorStop(0,'rgba(139,92,246,0.9)');tg.addColorStop(1,'transparent');s2ctx.fillStyle=tg;s2ctx.beginPath();s2ctx.arc(px,py+46,14,0,Math.PI*2);s2ctx.fill();
    s2ctx.fillStyle='#6d28d9';s2ctx.beginPath();s2ctx.moveTo(px-16,py+40);s2ctx.lineTo(px+16,py+40);s2ctx.lineTo(px,py+54);s2ctx.fill();
    s2ctx.fillStyle='#e2e8f0';s2ctx.beginPath();s2ctx.moveTo(px,py);s2ctx.lineTo(px-18,py+38);s2ctx.lineTo(px+18,py+38);s2ctx.closePath();s2ctx.fill();
    s2ctx.fillStyle='#8b5cf6';s2ctx.fillRect(px-3,py+10,6,20);s2ctx.fillStyle='#ffd700';s2ctx.beginPath();s2ctx.ellipse(px,py+18,7,10,0,0,Math.PI*2);s2ctx.fill();
  }
  s2ctx.fillStyle='rgba(0,0,0,0.45)';s2ctx.fillRect(0,0,W,42);
  s2ctx.fillStyle='#ef4444';s2ctx.font=`bold ${Math.floor(W/20)}px Nunito,sans-serif`;s2ctx.fillText('❤️'.repeat(SH.hp),8,28);
  s2ctx.fillStyle='#ffd700';s2ctx.fillText('Wave '+SH.wave,W/2-30,28);
  s2ctx.fillStyle='#22c55e';s2ctx.fillText(SH.score+'pts',W-90,28);
  document.getElementById('shooter-score-badge').textContent=SH.score+' pts';
  if(SH.frame<100){s2ctx.fillStyle='rgba(255,255,255,0.8)';s2ctx.font=`bold ${Math.floor(W/10)}px Orbitron,monospace`;s2ctx.textAlign='center';s2ctx.fillText('WAVE '+SH.wave,W/2,H/2);s2ctx.textAlign='left';}
  _gl=requestAnimationFrame(shooterLoop);
}
function shooterOver(won=false){
  cancelAnimationFrame(_gl);_gl=null;const best=STATE.best.shooter||0;addScore('shooter',SH.score);if(won)addWin();
  document.getElementById('shooter-over-title').textContent=won?'🏆 You Win! All Waves Cleared!':'Game Over!';
  document.getElementById('shooter-final-score').textContent=SH.score;
  document.getElementById('shooter-best-label').textContent=SH.score>best?'🏆 New Best!':'Best: '+Math.max(best,SH.score);
  document.getElementById('shooter-over').classList.remove('hidden');
}
shooterResize();
history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>{history.pushState(null,'',location.href);goHome();});
</script>
</body>
</html>
