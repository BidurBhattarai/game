<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080b14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>Infinite Runner — GameHub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg0:#060912;--gold:#f0b429;--purple:#8b5cf6;--pink:#e91e8c;--orange:#f97316;--text:#e8eaf0;--text2:#8892a4;--ff-display:'Orbitron',monospace;--ff-body:'Nunito',system-ui,sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:var(--ff-body);user-select:none;-webkit-user-select:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.g-topbar{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(6,9,18,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:50;}
.g-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--text);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.g-back:active{background:rgba(255,255,255,0.2)}
.g-title{font-family:var(--ff-display);font-size:0.85rem;font-weight:900;flex:1;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.g-score-badge{padding:5px 12px;border-radius:99px;border:1px solid rgba(240,180,41,0.3);font-size:0.75rem;font-weight:800;color:var(--gold);background:rgba(240,180,41,0.08);white-space:nowrap;}
.canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
canvas{display:block;max-width:100%;max-height:100%}
.canvas-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,9,18,0.88);backdrop-filter:blur(6px);gap:14px;padding:28px;pointer-events:all;}
.canvas-overlay.hidden{display:none;pointer-events:none}
.co-icon{font-size:4rem}.co-title{font-family:var(--ff-display);font-size:clamp(1.4rem,5vw,2rem);font-weight:900;text-align:center;}
.co-desc{font-size:0.88rem;color:var(--text2);text-align:center;max-width:280px}
.co-score{font-family:var(--ff-display);font-size:2.8rem;font-weight:900;color:var(--gold);}
.co-best{font-size:0.85rem;color:var(--text2)}
.co-btn{padding:14px 36px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:1rem;font-weight:900;cursor:pointer;font-family:var(--ff-display);touch-action:manipulation;}
.co-btn2{padding:10px 24px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text2);font-size:0.85rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.dpad{position:absolute;bottom:14px;left:14px;display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:3px;z-index:10;}
.dpad.hidden{display:none}
.dpbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-user-select:none;}
.dpbtn:active,.dpbtn.pressed{background:rgba(139,92,246,0.4)}
.dpbtn.empty{visibility:hidden;pointer-events:none}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(14,18,32,0.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:10px 22px;font-size:0.85rem;font-weight:700;color:var(--text);z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="screen">
  <div class="g-topbar">
    <button class="g-back" onclick="goHome()">←</button>
    <div class="g-title">🏃 Infinite Runner</div>
    <div class="g-score-badge" id="runner-score-badge">0 pts</div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gc"></canvas>
    <div class="canvas-overlay" id="runner-start">
      <div class="co-icon">🏃‍♂️</div>
      <div class="co-title">Infinite Runner</div>
      <div class="co-desc">Tap or press Space to jump over obstacles and collect coins!</div>
      <button class="co-btn" onclick="runnerStart()">▶ START</button>
    </div>
    <div class="canvas-overlay hidden" id="runner-over">
      <div class="co-icon">💀</div>
      <div class="co-title">Game Over!</div>
      <div class="co-score" id="runner-final-score">0</div>
      <div class="co-best" id="runner-best-label">Best: 0</div>
      <button class="co-btn" onclick="runnerStart()">🔄 Play Again</button>
      <button class="co-btn2" onclick="goHome()">← Hub</button>
    </div>
    <div class="dpad hidden" id="runner-dpad">
      <div class="dpbtn empty"></div>
      <button class="dpbtn" id="rdp-up" ontouchstart="dp('up',true)" ontouchend="dp('up',false)">▲</button>
      <div class="dpbtn empty"></div>
      <div class="dpbtn empty"></div><div class="dpbtn empty"></div><div class="dpbtn empty"></div>
      <div class="dpbtn empty"></div><div class="dpbtn empty"></div><div class="dpbtn empty"></div>
    </div>
  </div>
</div>
<script>
const LS={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
let STATE=LS.get('gh_state',{pts:0,played:0,wins:0,best:{}});
function saveState(){LS.set('gh_state',STATE)}
function addScore(id,s){STATE.pts+=s;if(!STATE.best[id]||s>STATE.best[id])STATE.best[id]=s;saveState();}
function goHome(){if(_gl)cancelAnimationFrame(_gl);window.location.href='../index.html';}
let _toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const K={up:false,down:false,left:false,right:false,fire:false};
function dp(k,v){K[k]=v;}
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){K.up=true;e.preventDefault();}if(e.key===' '||e.key==='Enter'){K.fire=true;K.up=true;e.preventDefault();}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')K.up=false;if(e.key===' '||e.key==='Enter'){K.fire=false;K.up=false;}});
const rcv=document.getElementById('gc');
const rctx=rcv.getContext('2d');
let RN={};let _gl=null;
function runnerResize(){const wr=rcv.parentElement;rcv.width=wr.clientWidth;rcv.height=wr.clientHeight;}
window.addEventListener('resize',runnerResize);
rcv.addEventListener('touchstart',e=>{e.preventDefault();K.up=true;},{passive:false});
rcv.addEventListener('touchend',e=>{e.preventDefault();K.up=false;},{passive:false});
function runnerStart(){
  document.getElementById('runner-start').classList.add('hidden');
  document.getElementById('runner-over').classList.add('hidden');
  runnerResize();
  const W=rcv.width,H=rcv.height,GY=H*0.78;
  RN={score:0,frame:0,speed:4.5,dist:0,px:W*0.15,py:GY,vy:0,onG:true,prevUp:false,obs:[],coins:[],spT:0,cnT:0,stars:Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*(GY*0.8),s:Math.random()*1.5+0.5})),GY,W,H};
  if(_gl)cancelAnimationFrame(_gl);_gl=requestAnimationFrame(runnerLoop);
}
function runnerLoop(){
  const{W,H,GY}=RN;RN.frame++;RN.dist++;RN.speed=4.5+Math.floor(RN.dist/400)*0.4;
  const upNow=K.up||K.fire;
  if(upNow&&!RN.prevUp&&RN.onG){RN.vy=-H*0.017;RN.onG=false;}
  RN.prevUp=upNow;RN.vy+=H*0.00085;RN.py+=RN.vy;
  if(RN.py>=GY){RN.py=GY;RN.vy=0;RN.onG=true;}
  RN.spT++;const spI=Math.max(38,100-Math.floor(RN.dist/250)*4);
  if(RN.spT>=spI){const oh=28+Math.random()*55;RN.obs.push({x:W+30,y:GY-oh+40,w:22,h:oh});RN.spT=0;}
  RN.cnT++;if(RN.cnT>=65){RN.coins.push({x:W+20,y:GY-55-Math.random()*90,r:9,got:false});RN.cnT=0;}
  RN.obs.forEach(o=>o.x-=RN.speed);RN.coins.forEach(c=>c.x-=RN.speed);
  RN.obs=RN.obs.filter(o=>o.x>-50);RN.coins=RN.coins.filter(c=>c.x>-30);
  const px=RN.px-18,py=RN.py;
  for(const o of RN.obs){if(px+30>o.x+4&&px+6<o.x+o.w-4&&py+40>o.y&&py<o.y+o.h){runnerOver();return;}}
  for(const c of RN.coins){if(!c.got&&Math.hypot(RN.px-c.x,py+20-c.y)<22){c.got=true;RN.score+=10;}}
  if(RN.frame%25===0)RN.score++;
  const sg=rctx.createLinearGradient(0,0,0,H);sg.addColorStop(0,'#04081a');sg.addColorStop(1,'#0d1a08');
  rctx.fillStyle=sg;rctx.fillRect(0,0,W,H);
  RN.stars.forEach(s=>{s.x-=0.3;if(s.x<0)s.x=W;rctx.fillStyle=`rgba(255,255,255,${0.3+s.s*0.15})`;rctx.beginPath();rctx.arc(s.x,s.y,s.s*0.6,0,Math.PI*2);rctx.fill();});
  rctx.fillStyle='#1a3d0a';rctx.fillRect(0,GY+40,W,H-GY-40);rctx.fillStyle='#2d6614';rctx.fillRect(0,GY+40,W,8);
  RN.obs.forEach(o=>{rctx.fillStyle='#8b0000';rctx.fillRect(o.x,o.y,o.w,o.h);rctx.fillStyle='#cc0000';rctx.fillRect(o.x+2,o.y+2,o.w-4,8);rctx.fillStyle='#ff4444';for(let i=0;i<2;i++){rctx.beginPath();rctx.moveTo(o.x+5+i*10,o.y);rctx.lineTo(o.x+9+i*10,o.y-12);rctx.lineTo(o.x+13+i*10,o.y);rctx.fill();}});
  RN.coins.forEach(c=>{if(c.got)return;rctx.fillStyle='#ffd700';rctx.beginPath();rctx.arc(c.x,c.y,c.r,0,Math.PI*2);rctx.fill();rctx.fillStyle='#ffec5c';rctx.beginPath();rctx.arc(c.x-2,c.y-2,c.r*0.4,0,Math.PI*2);rctx.fill();});
  const px2=RN.px,py2=RN.py,rf=Math.floor(RN.frame/7)%2;
  rctx.fillStyle='#8b5cf6';rctx.fillRect(px2-12,py2+14,22,24);rctx.fillStyle='#ffd166';rctx.fillRect(px2-10,py2,18,18);
  rctx.fillStyle='#000';rctx.fillRect(px2-6,py2+4,4,4);rctx.fillRect(px2+2,py2+4,4,4);
  rctx.fillStyle='#e91e8c';rctx.beginPath();rctx.moveTo(px2-12,py2+16);rctx.lineTo(px2-22,py2+28);rctx.lineTo(px2-12,py2+32);rctx.fill();
  rctx.fillStyle='#6d3aaa';if(rf===0){rctx.fillRect(px2-10,py2+36,8,12);rctx.fillRect(px2,py2+40,8,8);}else{rctx.fillRect(px2-10,py2+40,8,8);rctx.fillRect(px2,py2+36,8,12);}
  rctx.fillStyle='rgba(0,0,0,0.45)';rctx.fillRect(0,0,W,42);
  rctx.fillStyle='#ffd700';rctx.font=`bold ${Math.floor(W/22)}px Nunito,sans-serif`;rctx.fillText('⭐ '+RN.score,10,28);
  rctx.fillStyle='#8892a4';rctx.fillText(Math.floor(RN.dist/10)+'m',W-80,28);
  document.getElementById('runner-score-badge').textContent=RN.score+' pts';
  _gl=requestAnimationFrame(runnerLoop);
}
function runnerOver(){
  cancelAnimationFrame(_gl);_gl=null;
  const best=STATE.best.runner||0;addScore('runner',RN.score);
  document.getElementById('runner-final-score').textContent=RN.score;
  document.getElementById('runner-best-label').textContent=RN.score>best?'🏆 New Best!':'Best: '+Math.max(best,RN.score);
  document.getElementById('runner-over').classList.remove('hidden');
}
runnerResize();
if('ontouchstart' in window)document.getElementById('runner-dpad').classList.remove('hidden');
history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>{history.pushState(null,'',location.href);goHome();});
</script>
</body>
</html>
