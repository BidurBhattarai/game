<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d1a2e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>Memory Cards — GameHub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg0:#060912;--bg2:#141828;--bg3:#1e2438;--gold:#f0b429;--gold2:#ffd166;--purple:#8b5cf6;--pink:#e91e8c;--orange:#f97316;--cyan:#06d6a0;--text:#e8eaf0;--text2:#8892a4;--ff-display:'Orbitron',monospace;--ff-body:'Nunito',system-ui,sans-serif;--radius-sm:10px;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--ff-body);user-select:none;-webkit-user-select:none;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:radial-gradient(ellipse at 50% 0%,#0d1a2e,var(--bg0) 70%);overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none}
.g-topbar{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(6,9,18,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:50;position:sticky;top:0;}
.g-back{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--text);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.g-back:active{background:rgba(255,255,255,0.2)}
.g-title{font-family:var(--ff-display);font-size:0.85rem;font-weight:900;flex:1;background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.g-score-badge{padding:5px 12px;border-radius:99px;border:1px solid rgba(240,180,41,0.3);font-size:0.75rem;font-weight:800;color:var(--gold);background:rgba(240,180,41,0.08);white-space:nowrap;}
.mem-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 16px 20px;gap:10px;max-width:480px;margin:0 auto;width:100%;}
.mem-hud{display:flex;gap:16px;width:100%;background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);padding:10px 16px;}
.mem-hud-item{flex:1;display:flex;flex-direction:column;align-items:center}
.mem-hud-val{font-family:var(--ff-display);font-size:1.1rem;color:var(--cyan);font-weight:900}
.mem-hud-lbl{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.mem-size-row{display:flex;gap:8px}
.mem-sz-btn{padding:8px 16px;border-radius:99px;border:1.5px solid rgba(255,255,255,0.1);background:var(--bg2);color:var(--text2);font-size:0.78rem;font-weight:800;cursor:pointer;transition:all 0.15s;touch-action:manipulation;}
.mem-sz-btn.on{border-color:var(--cyan);background:rgba(6,214,160,0.1);color:var(--cyan)}
.mem-grid{display:grid;gap:7px}
.mcard{aspect-ratio:1;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);touch-action:manipulation;}
.mcard.flipped,.mcard.done{transform:rotateY(180deg)}
.mcard.done{opacity:0.6}
.mc-face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.mc-front{background:var(--bg3);border:1.5px solid rgba(255,255,255,0.07);font-size:1.2rem;color:var(--text2)}
.mc-back{background:linear-gradient(135deg,var(--purple),var(--pink));transform:rotateY(180deg);font-size:1.6rem;border:1.5px solid rgba(255,255,255,0.15);}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(14,18,32,0.96);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:10px 22px;font-size:0.85rem;font-weight:700;color:var(--text);z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="toast"></div>
<div class="screen">
  <div class="g-topbar">
    <button class="g-back" onclick="goHome()">←</button>
    <div class="g-title">🃏 Memory Cards</div>
    <div class="g-score-badge" id="mem-score-badge">0 pts</div>
  </div>
  <div class="mem-body">
    <div class="mem-hud">
      <div class="mem-hud-item"><div class="mem-hud-val" id="mem-moves">0</div><div class="mem-hud-lbl">Moves</div></div>
      <div class="mem-hud-item"><div class="mem-hud-val" id="mem-time">0s</div><div class="mem-hud-lbl">Time</div></div>
      <div class="mem-hud-item"><div class="mem-hud-val" id="mem-pairs">0/<span id="mem-total">8</span></div><div class="mem-hud-lbl">Pairs</div></div>
    </div>
    <div class="mem-size-row">
      <button class="mem-sz-btn on" onclick="memStart(4,4)">4×4</button>
      <button class="mem-sz-btn" onclick="memStart(6,4)">6×4</button>
      <button class="mem-sz-btn" onclick="memStart(6,6)">6×6</button>
    </div>
    <div class="mem-grid" id="mem-grid"></div>
  </div>
</div>
<script>
const LS={get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
let STATE=LS.get('gh_state',{pts:0,played:0,wins:0,best:{}});
function saveState(){LS.set('gh_state',STATE)}
function addScore(id,s){STATE.pts+=s;if(!STATE.best[id]||s>STATE.best[id])STATE.best[id]=s;saveState();}
function addWin(){STATE.wins=(STATE.wins||0)+1;saveState();}
function goHome(){clearInterval(memTimer);window.location.href='../index.html';}
let _toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const MEM_EMOJIS=['🐶','🐱','🐭','🦊','🐻','🐼','🐨','🐯','🦁','🐸','🦄','🐙','🦋','🌸','🍎','🚀','🏆','💎','🌈','🎸','🎮','🌙','⚡','🔥'];
let MEM={};let memTimer=null;
function memStart(cols=4,rows=4){
  clearInterval(memTimer);
  const tot=cols*rows,pairs=tot/2;
  const emojis=MEM_EMOJIS.slice(0,pairs);
  const cards=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  MEM={cards:cards.map((e,i)=>({i,emoji:e,flipped:false,done:false})),cols,rows,first:null,second:null,lock:false,moves:0,matched:0,timer:0,score:0,pairs};
  document.getElementById('mem-total').textContent=pairs;
  document.getElementById('mem-moves').textContent='0';
  document.getElementById('mem-time').textContent='0s';
  document.getElementById('mem-pairs').textContent='0/'+pairs;
  document.querySelectorAll('.mem-sz-btn').forEach(b=>b.classList.toggle('on',b.textContent===cols+'×'+rows));
  memTimer=setInterval(()=>{MEM.timer++;document.getElementById('mem-time').textContent=MEM.timer+'s';},1000);
  memRender(cols);
}
function memRender(cols=MEM.cols){
  const g=document.getElementById('mem-grid');
  const cs=Math.min(Math.floor(360/cols)-8,72);
  g.style.gridTemplateColumns=`repeat(${cols},${cs}px)`;
  g.innerHTML='';
  MEM.cards.forEach((card,i)=>{
    const el=document.createElement('div');
    el.className='mcard'+(card.flipped||card.done?' flipped':'')+(card.done?' done':'');
    el.style.cssText=`width:${cs}px;height:${cs}px;font-size:${cs*0.45}px`;
    el.innerHTML=`<div class="mc-face mc-front">?</div><div class="mc-face mc-back">${card.emoji}</div>`;
    if(!card.done)el.addEventListener('click',()=>memFlip(i));
    g.appendChild(el);
  });
}
function memFlip(i){
  if(MEM.lock||MEM.cards[i].flipped||MEM.cards[i].done)return;
  MEM.cards[i].flipped=true;memRender();
  if(!MEM.first){MEM.first=i;return;}
  MEM.second=i;MEM.lock=true;MEM.moves++;
  document.getElementById('mem-moves').textContent=MEM.moves;
  if(MEM.cards[MEM.first].emoji===MEM.cards[MEM.second].emoji){
    MEM.cards[MEM.first].done=MEM.cards[MEM.second].done=true;MEM.matched++;MEM.first=MEM.second=null;MEM.lock=false;
    document.getElementById('mem-pairs').textContent=MEM.matched+'/'+MEM.pairs;MEM.score+=Math.max(60-MEM.moves,15);
    document.getElementById('mem-score-badge').textContent=MEM.score+' pts';memRender();
    if(MEM.matched===MEM.pairs){clearInterval(memTimer);MEM.score+=Math.max(300-MEM.timer*3,50);addScore('memory',MEM.score);addWin();setTimeout(()=>toast('🃏 Memory Master! Score: '+MEM.score),300);}
  } else {setTimeout(()=>{MEM.cards[MEM.first].flipped=MEM.cards[MEM.second].flipped=false;MEM.first=MEM.second=null;MEM.lock=false;memRender();},850);}
}
memStart(4,4);
history.pushState(null,'',location.href);
window.addEventListener('popstate',()=>{history.pushState(null,'',location.href);goHome();});
</script>
</body>
</html>
